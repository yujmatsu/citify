name: Lint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# 同一ブランチ・PR で並列実行を抑制 (Cancel-in-progress)
concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python: Ruff lint + format check (apps/api / agents / scrapers)
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install --no-cache-dir "ruff>=0.7"

      - name: Ruff check (apps/api)
        run: ruff check apps/api/
        if: ${{ hashFiles('apps/api/**/*.py') != '' }}

      - name: Ruff format --check (apps/api)
        run: ruff format --check apps/api/
        if: ${{ hashFiles('apps/api/**/*.py') != '' }}

      - name: Ruff check (agents)
        run: ruff check agents/
        if: ${{ hashFiles('agents/**/*.py') != '' }}

      - name: Ruff check (scrapers / pkg)
        run: ruff check scrapers/ pkg/
        if: ${{ hashFiles('scrapers/**/*.py') != '' }}

      - name: Ruff format --check (agents / scrapers / pkg)
        run: ruff format --check agents/ scrapers/ pkg/
        if: ${{ hashFiles('agents/**/*.py') != '' }}

  # ---------------------------------------------------------------------------
  # Python: pytest (回帰防御ゲート)
  # apps/api/pyproject.toml の dependencies + dev を抽出して install (パッケージ
  # ビルド不要)。リポジトリのコードは pythonpath=["."] (root pyproject) で import。
  # ---------------------------------------------------------------------------
  python-test:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (from apps/api/pyproject.toml)
        run: |
          python - <<'PY'
          import tomllib
          d = tomllib.load(open("apps/api/pyproject.toml", "rb"))
          deps = d["project"]["dependencies"]
          deps += d["project"].get("optional-dependencies", {}).get("dev", [])
          open("ci-requirements.txt", "w").write("\n".join(deps) + "\n")
          print("\n".join(deps))
          PY
          pip install --no-cache-dir -r ci-requirements.txt

      - name: Run pytest
        run: python -m pytest agents apps/api scrapers pkg -q

  # ---------------------------------------------------------------------------
  # Terraform: fmt check
  # ---------------------------------------------------------------------------
  terraform-fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform fmt --check
        run: terraform fmt -check -recursive infra/
        if: ${{ hashFiles('infra/**/*.tf') != '' }}

  # ---------------------------------------------------------------------------
  # Secret scanning: gitleaks (API キー漏洩防止)
  # Reinfolib (Ocp-Apim-Subscription-Key) / e-Stat appId / Gemini API key /
  # GCP service account JSON 等の典型パターンを検知して commit / PR を block。
  #
  # 設計:
  #   - gitleaks 公式 binary を download → 自前実行 (license 縛りなし、private repo 対応)
  #   - fetch-depth=0 で全 history scan (PR / main push どちらも完全な scan)
  #   - 失敗時は CI を red にして、PR をブロック
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全 history を scan するため

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --no-banner --redact
