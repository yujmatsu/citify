# Citify pre-commit hooks
#
# 目的:
#   - API キー漏洩防止 (Reinfolib / e-Stat / Gemini など) — gitleaks
#   - Python フォーマット (ruff) — 既存運用と整合
#   - Terraform フォーマット — 既存運用と整合
#
# 導入方法:
#   pip install pre-commit
#   pre-commit install
#
# 手動実行:
#   pre-commit run --all-files
#
# bypass (どうしても commit を通したい時、推奨しない):
#   git commit --no-verify
#   → ただし CI 側 gitleaks で再度検出されるので最終的に push できない
repos:
  # ------------------------------------------------------------------
  # gitleaks — API キー漏洩検出 (Reinfolib Ocp-Apim-Subscription-Key,
  # e-Stat appId, Gemini API key などの典型パターンを検知)
  # ------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: gitleaks (API key 漏洩検出)
        description: |
          コミット前にリポジトリ全体を gitleaks でスキャンし、
          API キー / アクセストークン / シークレットが含まれていれば commit を block する。

  # ------------------------------------------------------------------
  # Ruff (Python) — apps/api / agents / scrapers / pkg / workers
  # ------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix]
      - id: ruff-format
        name: ruff format

  # ------------------------------------------------------------------
  # Terraform fmt — infra/
  # ------------------------------------------------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
        name: terraform fmt
