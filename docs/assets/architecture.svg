  <text x="360" y="287" font-size="13" font-weight="600" fill="#0f172a">📮 Distributor Agent</text>
  <text x="360" y="305" font-size="11" fill="#64748b">MMR 多様性ランキング</text>
  <rect x="560" y="266" width="180" height="52" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="570" y="287" font-size="13" font-weight="600" fill="#0f172a">🧪 Critic Agent</text>
  <text x="570" y="305" font-size="11" fill="#64748b">翻訳品質の自己批評 (opt-in)</text>

  <line x1="530" y1="214" x2="558" y2="214" stroke="#2563eb" stroke-width="2" marker-end="url(#arrB)"/>
  <line x1="650" y1="240" x2="650" y2="252" stroke="#2563eb" stroke-width="2"/>
