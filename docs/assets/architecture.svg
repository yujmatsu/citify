  <text x="350" y="152" font-size="16" font-weight="700" fill="#1e40af">⚙️ 非同期パイプライン — Pub/Sub + Cloud Run Jobs</text>
  <text x="350" y="172" font-size="11.5" fill="#3b82f6">Cloud Scheduler 09:00 JST 日次起動 / DLQ + fan-out 構成</text>

  <rect x="350" y="188" width="180" height="52" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="360" y="209" font-size="13" font-weight="600" fill="#0f172a">🖊️ Translator Agent</text>
