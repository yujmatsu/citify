  <rect x="560" y="188" width="180" height="52" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="570" y="209" font-size="13" font-weight="600" fill="#0f172a">🎯 Relevance Agent</text>
  <text x="570" y="227" font-size="11" fill="#64748b">4軸採点 × 5ペルソナ fan-out</text>
