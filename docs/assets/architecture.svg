  <rect width="1680" height="960" fill="#f8fafc"/>

  <!-- Title -->
  <text x="40" y="52" font-size="30" font-weight="700" fill="#0f172a">🏛️ Citify — システムアーキテクチャ</text>
  <text x="40" y="80" font-size="15" fill="#475569">自治体の議事録・プレス・統計を 13 の AI エージェントが翻訳・採点・分析し、若者向け For You フィードと「街の見張り番」Watcher で届ける (Google Cloud / 2026-07)</text>

  <!-- ============ Data sources ============ -->
  <rect x="40" y="120" width="240" height="330" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="152" font-size="16" font-weight="700" fill="#334155">📥 公開データソース</text>
  <rect x="60" y="170" width="200" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="70" y="193" font-size="13.5" font-weight="600" fill="#0f172a">国会会議録検索 API</text>
  <text x="70" y="212" font-size="11.5" fill="#64748b">発言 2,000 件超</text>
  <rect x="60" y="236" width="200" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="70" y="259" font-size="13.5" font-weight="600" fill="#0f172a">自治体議事録</text>
  <text x="70" y="278" font-size="11.5" fill="#64748b">kaigiroku.net (Playwright)</text>
  <rect x="60" y="302" width="200" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="70" y="325" font-size="13.5" font-weight="600" fill="#0f172a">プレスリリース RSS</text>
  <text x="70" y="344" font-size="11.5" fill="#64748b">45 自治体 (都道府県+政令市)</text>
  <rect x="60" y="368" width="200" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="70" y="391" font-size="13.5" font-weight="600" fill="#0f172a">統計オープンデータ</text>
  <text x="70" y="410" font-size="11.5" fill="#64748b">e-Stat / 不動産情報ライブラリ</text>
  <text x="60" y="438" font-size="11" fill="#94a3b8">robots.txt・利用規約を尊重</text>

  <!-- ============ Pipeline ============ -->
