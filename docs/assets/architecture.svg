  <rect x="845" y="546" width="200" height="26" rx="13" fill="#f0fdf4" stroke="#86efac"/><text x="858" y="564" font-size="11.5" fill="#166534">🩺 Scraper Doctor 失敗診断</text>
  <rect x="1053" y="546" width="220" height="26" rx="13" fill="#f0fdf4" stroke="#86efac"/><text x="1066" y="564" font-size="11.5" fill="#166534">💰 Cost Hunter コスト異常検知</text>

